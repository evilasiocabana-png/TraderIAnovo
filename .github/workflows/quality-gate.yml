name: TraderIA Critical CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  critical-ci:
    name: Lab Forex MT5 Critical Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install streamlit duckdb

      - name: Run critical validation
        run: python scripts/run_critical_ci.py

      - name: Collect failure context
        if: failure()
        run: python scripts/collect_failure_context.py

      - name: Upload failure context
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traderia-critical-ci-context
          if-no-files-found: ignore
          retention-days: 30
          path: |
            reports/failure_context.json
